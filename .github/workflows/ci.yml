name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: build wizard
        working-directory: wizard
        run: go build ./...
      - name: vet wizard
        working-directory: wizard
        run: go vet ./...
      - name: tidy mcp deps
        working-directory: mcp
        # Populates any missing go.sum entries against the public sumdb so
        # we don't have to commit them by hand from a Go-less workstation.
        # `tidy` is more aggressive than `download`: it writes go.sum to match
        # the actual import graph, picking up new requires that haven't been
        # checksummed yet.
        run: go mod tidy
      - name: build mcp
        working-directory: mcp
        run: go build ./...
      - name: vet mcp
        working-directory: mcp
        run: go vet ./...

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build localmind binary
        working-directory: wizard
        run: go build -o ../bin/localmind ./cmd/localmind
      - name: docker compose config validates
        run: docker compose -f docker-compose.yml config > /dev/null
      - name: smoke test
        run: bash scripts/smoke.sh
