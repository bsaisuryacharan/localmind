name: localmind

x-restart: &restart
  restart: unless-stopped

services:
  ollama:
    <<: *restart
    image: ollama/ollama:latest
    container_name: localmind-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "2"

  webui:
    <<: *restart
    image: ghcr.io/open-webui/open-webui:main
    container_name: localmind-webui
    depends_on:
      - ollama
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - webui:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "${WEBUI_AUTH:-true}"
      WEBUI_NAME: "localmind"
      ENABLE_RAG_WEB_SEARCH: "false"
      DEFAULT_USER_ROLE: "admin"

  whisper:
    <<: *restart
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: localmind-whisper
    ports:
      - "${WHISPER_PORT:-9000}:9000"
    environment:
      ASR_MODEL: "${WHISPER_MODEL:-base}"
      ASR_ENGINE: faster_whisper

  piper:
    <<: *restart
    image: rhasspy/wyoming-piper:latest
    container_name: localmind-piper
    ports:
      - "${PIPER_PORT:-10200}:10200"
    command: --voice ${PIPER_VOICE:-en_US-lessac-medium}
    volumes:
      - piper:/data

  ocrmypdf:
    <<: *restart
    build:
      context: ./ocrmypdf
    container_name: localmind-ocr
    ports:
      - "${OCR_PORT:-9100}:8000"

  mcp:
    <<: *restart
    build:
      context: ./mcp
    container_name: localmind-mcp
    depends_on:
      - ollama
      - ocrmypdf
    ports:
      - "${MCP_PORT:-7800}:7800"
    volumes:
      - ./data:/data:ro
      - mcp_index:/var/lib/localmind
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATA_DIR: /data
      INDEX_DIR: /var/lib/localmind
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      OCR_BASE_URL: "${OCR_BASE_URL:-http://ocrmypdf:8000}"

  orchestrator:
    <<: *restart
    build:
      context: ./orchestrator
    container_name: localmind-orchestrator
    depends_on:
      - ollama
      - mcp
    # Bind to localhost only — the orchestrator is intentionally NOT
    # exposed publicly. Reach it through the responder's /agent/* routes.
    ports:
      - "127.0.0.1:${ORCHESTRATOR_PORT:-7950}:7950"
    volumes:
      - orchestrator_state:/var/lib/localmind
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      LOCALMIND_MCP_URL: http://mcp:7800/mcp
      LOCALMIND_MCP_TOKEN: "${LOCALMIND_MCP_TOKEN:-}"
      LOCALMIND_ORCHESTRATOR_DB: /var/lib/localmind/orchestrator.db

volumes:
  ollama:
  webui:
  piper:
  mcp_index:
  orchestrator_state:
