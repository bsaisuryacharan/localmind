<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>localmind agent</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e3e6eb;
    --fg: #1d2129;
    --muted: #6b7280;
    --user: #2563eb;
    --user-fg: #ffffff;
    --orch: #047857;
    --synth: #6d28d9;
    --other: #eef0f3;
    --warn: #b45309;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; max-width: 820px; margin: 0 auto;
    background: var(--panel); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  header { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--border); }
  header .title { font-weight: 600; }
  header .gid { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #aaa; flex: 0 0 auto; }
  .dot.live { background: #10b981; }
  .dot.dead { background: #ef4444; }
  main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.right { align-self: flex-end; align-items: flex-end; }
  .msg.left { align-self: flex-start; align-items: flex-start; }
  .who { font-size: 11px; color: var(--muted); margin: 0 6px 2px; }
  .bubble { padding: 8px 12px; border-radius: 12px; background: var(--other); white-space: pre-wrap;
    word-wrap: break-word; }
  .msg.right .bubble { background: var(--user); color: var(--user-fg); border-bottom-right-radius: 4px; }
  .msg.left .bubble { border-bottom-left-radius: 4px; }
  .msg.orch .bubble { background: #d1fae5; color: #064e3b; }
  .msg.synth .bubble { background: #ede9fe; color: #4c1d95; }
  .msg .ts { font-size: 10px; color: var(--muted); margin: 2px 6px 0; }
  .confirm { margin-top: 6px; display: flex; gap: 6px; }
  .confirm button { font: inherit; padding: 4px 10px; border: 1px solid var(--border);
    background: #fff; border-radius: 6px; cursor: pointer; }
  .confirm button:hover { background: #f3f4f6; }
  footer { border-top: 1px solid var(--border); padding: 10px 12px; display: flex; gap: 8px;
    align-items: flex-end; background: var(--panel); }
  textarea { flex: 1; resize: none; min-height: 38px; max-height: 140px; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 8px; font: inherit; }
  button.send { padding: 8px 16px; background: var(--user); color: var(--user-fg); border: none;
    border-radius: 8px; font: inherit; cursor: pointer; }
  button.send:disabled { opacity: 0.5; cursor: default; }
  .mode-hint { font-size: 11px; color: var(--muted); padding: 0 12px 6px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="dot" id="status-dot" title="disconnected"></div>
    <div class="title">localmind agent</div>
    <div class="gid" id="gid">—</div>
  </header>
  <main id="chat"></main>
  <div class="mode-hint" id="mode-hint">Enter a query to start a new run.</div>
  <footer>
    <textarea id="input" rows="1" placeholder="Enter a query..."></textarea>
    <button class="send" id="send">Send</button>
  </footer>
</div>
<script>
(function () {
  // ----- token + URL plumbing -----
  // The PWA / phone visits /agent?token=... so the requireToken middleware
  // accepts the GET. We re-attach the token on every fetch + EventSource
  // URL we build below.
  var url = new URL(window.location.href);
  var token = url.searchParams.get("token") || "";
  var graphId = url.searchParams.get("id") || null;

  function withTok(path) {
    return path + (token ? (path.indexOf("?") >= 0 ? "&" : "?") + "token=" + encodeURIComponent(token) : "");
  }

  // ----- DOM refs -----
  var chat = document.getElementById("chat");
  var input = document.getElementById("input");
  var sendBtn = document.getElementById("send");
  var statusDot = document.getElementById("status-dot");
  var gidEl = document.getElementById("gid");
  var modeHint = document.getElementById("mode-hint");

  function setStatus(state) {
    statusDot.className = "dot" + (state ? " " + state : "");
    statusDot.title = state || "disconnected";
  }

  function refreshMode() {
    if (graphId) {
      gidEl.textContent = graphId;
      input.placeholder = "@user mid-flight message...";
      modeHint.textContent = "In-flight: messages are injected as @user.";
    } else {
      gidEl.textContent = "—";
      input.placeholder = "Enter a query...";
      modeHint.textContent = "Enter a query to start a new run.";
    }
  }

  function escapeHTML(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Map a speaker tag (`@orchestrator`, `@synthesizer`, `@user`, ...) to
  // a CSS class. Anything we don't know about goes into the generic
  // "left/other" bubble.
  function speakerClass(speaker) {
    var s = (speaker || "").replace(/^@/, "").toLowerCase();
    if (s === "user") return "right";
    if (s === "orchestrator") return "left orch";
    if (s === "synthesizer") return "left synth";
    return "left other";
  }

  function fmtTime(ts) {
    if (!ts) return "";
    try {
      var d = new Date(ts * 1000);
      return d.toLocaleTimeString();
    } catch (e) { return ""; }
  }

  function renderMessage(m) {
    var div = document.createElement("div");
    div.className = "msg " + speakerClass(m.speaker);

    var who = document.createElement("div");
    who.className = "who";
    who.textContent = m.speaker || "?";
    div.appendChild(who);

    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = m.body || "";
    div.appendChild(bubble);

    if (m.kind === "confirm-request" && graphId) {
      var c = document.createElement("div");
      c.className = "confirm";
      var yes = document.createElement("button");
      yes.textContent = "Accept";
      yes.onclick = function () { sendConfirm(true); };
      var no = document.createElement("button");
      no.textContent = "Reject";
      no.onclick = function () { sendConfirm(false); };
      c.appendChild(yes); c.appendChild(no);
      div.appendChild(c);
    }

    var ts = document.createElement("div");
    ts.className = "ts";
    ts.textContent = fmtTime(m.ts_unix);
    div.appendChild(ts);

    chat.appendChild(div);
    // Stick to the bottom unless the user has scrolled up.
    chat.scrollTop = chat.scrollHeight;
  }

  // ----- API calls -----
  function sendConfirm(accepted) {
    return fetch(withTok("/agent/confirm/" + graphId), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ accepted: accepted })
    });
  }

  function postRun(body) {
    return fetch(withTok("/agent/run"), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: body })
    }).then(function (r) { return r.json(); });
  }

  function postInject(body) {
    return fetch(withTok("/agent/inject/" + graphId), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ body: body })
    });
  }

  // ----- streaming -----
  var es = null;
  function openStream(id) {
    if (es) { try { es.close(); } catch (e) {} }
    setStatus("");
    es = new EventSource(withTok("/agent/stream/" + id));
    es.onopen = function () { setStatus("live"); };
    es.onerror = function () { setStatus("dead"); };
    es.onmessage = function (ev) {
      try {
        var m = JSON.parse(ev.data);
        renderMessage(m);
      } catch (e) {
        // SSE keepalive comments arrive as empty data; ignore parse errors.
      }
    };
  }

  function loadHistory(id) {
    return fetch(withTok("/agent/history/" + id))
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (msgs) {
        if (Array.isArray(msgs)) msgs.forEach(renderMessage);
      })
      .catch(function () {});
  }

  // ----- send button -----
  sendBtn.addEventListener("click", function () {
    var v = input.value.trim();
    if (!v) return;
    input.value = "";
    if (graphId) {
      // Render optimistically so the user sees their message before the
      // SSE round-trip echoes it back.
      renderMessage({ speaker: "@user", body: v, ts_unix: Date.now() / 1000 });
      postInject(v);
    } else {
      renderMessage({ speaker: "@user", body: v, ts_unix: Date.now() / 1000 });
      postRun(v).then(function (resp) {
        if (resp && resp.graph_id) {
          graphId = resp.graph_id;
          // Update URL so a refresh resumes the same graph.
          var u = new URL(window.location.href);
          u.searchParams.set("id", graphId);
          window.history.replaceState({}, "", u.toString());
          refreshMode();
          openStream(graphId);
        }
      });
    }
  });

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // ----- bootstrap -----
  refreshMode();
  if (graphId) {
    loadHistory(graphId).then(function () { openStream(graphId); });
  }
})();
</script>
</body>
</html>
