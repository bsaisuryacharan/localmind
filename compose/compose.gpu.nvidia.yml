# Overlay: enable NVIDIA GPU on Ollama and Whisper.
# Requires the NVIDIA Container Toolkit on the host.
# Apply with: docker compose -f docker-compose.yml -f compose/compose.gpu.nvidia.yml up -d

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      OLLAMA_NUM_GPU: "999"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
