name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to publish (e.g. v0.0.1); leave blank to skip release upload"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Surface whether code-signing secrets are set so the sign job can gate
    # on it. Job-level `if:` cannot reference `secrets.*` directly — that's
    # a GitHub Actions validator restriction — so we route it through a job
    # output instead.
    outputs:
      have-signing-secret: ${{ steps.check-signing.outputs.have }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - id: check-signing
        env:
          KV_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
        run: |
          if [ -n "$KV_URL" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
          fi

      - name: resolve version
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: cross-compile and archive
        working-directory: wizard
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ../dist
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            outdir="../build/${os}-${arch}"
            mkdir -p "$outdir"
            binname="localmind"
            if [ "$os" = "windows" ]; then
              binname="localmind.exe"
            fi
            echo "==> building $os/$arch ($binname)"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -ldflags="-s -w -X main.version=${VERSION}" \
                -o "$outdir/$binname" \
                ./cmd/localmind
            if [ "$os" = "windows" ]; then
              ( cd "$outdir" && zip -q "../../dist/localmind-windows-${arch}.zip" "$binname" )
            else
              tar -czf "../dist/localmind-${os}-${arch}.tar.gz" -C "$outdir" "$binname"
            fi
          done
          ls -lh ../dist

      - name: generate checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum localmind-*.tar.gz localmind-*.zip > checksums.txt
          cat checksums.txt

      - name: upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: localmind-release-${{ steps.vars.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: create github release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/localmind-*.tar.gz \
            dist/localmind-*.zip \
            dist/checksums.txt

  # authenticode-sign the windows binaries via azure key vault.
  # gated: this job is skipped until AZURE_KEY_VAULT_URL is configured.
  # see docs/code-signing.md for the secret setup.
  sign:
    needs: release
    if: ${{ needs.release.outputs.have-signing-secret == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: resolve version
        id: vars
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: localmind-release-${{ steps.vars.outputs.version }}
          path: dist

      - name: install azuresigntool
        shell: bash
        run: dotnet tool install --global AzureSignTool

      - name: unpack, sign, repack windows binaries
        shell: bash
        env:
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CERT_NAME: ${{ secrets.AZURE_CERT_NAME }}
        run: |
          set -euo pipefail
          mkdir -p signed
          for arch in amd64 arm64; do
            zip="dist/localmind-windows-${arch}.zip"
            workdir="signed/${arch}"
            mkdir -p "$workdir"
            unzip -q "$zip" -d "$workdir"
            AzureSignTool sign \
              --keyvault-url "$AZURE_KEY_VAULT_URL" \
              --keyvault-tenant-id "$AZURE_TENANT_ID" \
              --keyvault-client-id "$AZURE_CLIENT_ID" \
              --keyvault-client-secret "$AZURE_CLIENT_SECRET" \
              --keyvault-certificate "$AZURE_CERT_NAME" \
              --description "localmind" \
              --description-url "https://github.com/bsaisuryacharan/localmind" \
              --timestamp-rfc3161 "http://timestamp.digicert.com" \
              "$workdir/localmind.exe"
            ( cd "$workdir" && 7z a -tzip "../../dist/localmind-windows-${arch}.zip" "localmind.exe" )
          done

      - name: refresh checksums for signed archives
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum localmind-*.tar.gz localmind-*.zip > checksums.txt
          cat checksums.txt

      - name: re-upload signed artifacts to release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            dist/localmind-windows-amd64.zip \
            dist/localmind-windows-arm64.zip \
            dist/checksums.txt \
            --clobber
